server:
  port: 8080

spring:
  application:
    name: fintech-investigator
  config:
    import: optional:classpath:application-local.yml

investigator:
  ai:
    enabled: true
    temperature: 0.1
    max-tokens: 1200
    top-p: 0.9
    pipeline-timeout-seconds: 90
    investigator-model: gpt-3.5-turbo
    drafter-model: gpt-4.1-mini
  openai:
    api-key: ${INVESTIGATOR_OPENAI_API_KEY:}
  keep-alive:
    url: https://sust-preli-b8l9.onrender.com/health
    interval-ms: 540000
  queue:
    capacity: 50000
    workers: 256
    job-ttl-minutes: 60
    default-wait-seconds: 120
    enqueue-timeout-ms: 100
    max-stored-jobs: 100000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
