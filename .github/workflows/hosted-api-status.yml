name: Hosted API Status (Render)

# Visible proof for judges: production API is deployed and responding.
# Shows green ✓ in GitHub Actions on every push to main and on manual/scheduled runs.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

env:
  BASE_URL: https://sust-preli-b8l9.onrender.com
  HEALTH_URL: https://sust-preli-b8l9.onrender.com/health
  SWAGGER_URL: https://sust-preli-b8l9.onrender.com/swagger-ui.html
  OPENAPI_URL: https://sust-preli-b8l9.onrender.com/v3/api-docs

jobs:
  verify-hosted-deployment:
    name: Verify Render production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check /health returns ok
        id: health
        run: |
          set -euo pipefail
          echo "Checking ${HEALTH_URL}"
          BODY=$(curl -fsS --retry 5 --retry-delay 15 --retry-all-errors --max-time 120 "${HEALTH_URL}")
          echo "Response: ${BODY}"
          echo "${BODY}" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'
          echo "health_ok=true" >> "$GITHUB_OUTPUT"

      - name: Check Swagger UI is reachable
        id: swagger
        run: |
          set -euo pipefail
          CODE=$(curl -o /dev/null -s -w "%{http_code}" --retry 3 --retry-delay 10 --max-time 120 "${SWAGGER_URL}")
          echo "HTTP ${CODE} for ${SWAGGER_URL}"
          if [ "${CODE}" != "200" ] && [ "${CODE}" != "302" ]; then
            exit 1
          fi
          echo "swagger_ok=true" >> "$GITHUB_OUTPUT"

      - name: Check OpenAPI JSON is reachable
        id: openapi
        run: |
          set -euo pipefail
          CODE=$(curl -o /dev/null -s -w "%{http_code}" --retry 3 --retry-delay 10 --max-time 120 "${OPENAPI_URL}")
          echo "HTTP ${CODE} for ${OPENAPI_URL}"
          test "${CODE}" = "200"
          echo "openapi_ok=true" >> "$GITHUB_OUTPUT"

      - name: Publish status summary for judges
        if: always()
        run: |
          {
            echo "## Hosted API Status — Render"
            echo ""
            echo "| Check | Result | URL |"
            echo "|-------|--------|-----|"
            if [ "${{ steps.health.outcome }}" = "success" ]; then
              echo "| Health | ✅ **HOSTED & LIVE** | [\`${HEALTH_URL}\`](${HEALTH_URL}) |"
            else
              echo "| Health | ❌ Failed (cold start or service down — retry) | [\`${HEALTH_URL}\`](${HEALTH_URL}) |"
            fi
            if [ "${{ steps.swagger.outcome }}" = "success" ]; then
              echo "| Swagger UI | ✅ Reachable | [\`${SWAGGER_URL}\`](${SWAGGER_URL}) |"
            else
              echo "| Swagger UI | ❌ Unreachable | [\`${SWAGGER_URL}\`](${SWAGGER_URL}) |"
            fi
            if [ "${{ steps.openapi.outcome }}" = "success" ]; then
              echo "| OpenAPI | ✅ Reachable | [\`${OPENAPI_URL}\`](${OPENAPI_URL}) |"
            else
              echo "| OpenAPI | ❌ Unreachable | [\`${OPENAPI_URL}\`](${OPENAPI_URL}) |"
            fi
            echo ""
            echo "**Platform:** [Render](https://render.com) (Docker) · **Repo deploy:** push to \`main\` triggers this check"
            echo ""
            echo "**Main API:** \`POST ${BASE_URL}/analyze-ticket\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if health check failed
        if: steps.health.outcome != 'success'
        run: |
          echo "::error::Production health check failed. Render may be cold-starting — re-run this workflow in 1–2 minutes."
          exit 1
